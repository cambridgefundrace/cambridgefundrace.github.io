<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&amp;display=swap');
    </style>
  </defs>

  <!-- Square background -->
  <rect x="0" y="0" width="512" height="512" fill="#B8CDD9"/>

  <!-- "Fund" on top line, "Race" on bottom line, each fitting within 512px width -->
  <text x="130" y="400"
        font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
        font-weight="900" font-size="370" letter-spacing="-2"
        fill="#CC2936" text-anchor="middle">F</text>
  <text x="360" y="400"
        font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
        font-weight="900" font-size="370" letter-spacing="-2"
        fill="#1a1f3a" text-anchor="middle">R</text>
</svg>
